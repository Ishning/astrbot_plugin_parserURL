name: Plugin Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update metadata.yaml version
        run: |
          echo "更新 metadata.yaml 版本为： ${{ github.ref_name }}"
          yq -i ".version = \"${{ github.ref_name }}\"" metadata.yaml

      - name: Commit and Push Version Bump
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add metadata.yaml
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: bump version to ${{ github.ref_name }}" && git push origin HEAD:master)

      - name: Extract Latest Changelog Section
        id: changelog_reader
        run: |
          echo "${{ github.ref_name }} 的更新内容..."
          sed -n "/^## ${{ github.ref_name }}/,/^## v/p" CHANGELOG.md | sed '1d;$d' > release_notes.txt
          echo "更新内容如下："
          cat release_notes.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.txt
          name: Release ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
